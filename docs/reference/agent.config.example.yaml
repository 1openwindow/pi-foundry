# Example high-level configuration for bringing your own Pi agent to Foundry.
#
# This file is a reference for advanced/high-level agent configuration ideas.
# The default BYO adapter now uses .azd/open-foundry/open-foundry.yaml as its
# deployment source of truth. Runtime secrets are still supplied through azd env.

name: open-foundry
displayName: My Pi Agent on Foundry
description: Bring your own Pi skills, MCP servers, tools, prompts, and configuration to Microsoft Foundry.

runtime:
  type: pi-sdk
  # The pi adapter drives pi-coding-agent in-process via its SDK
  # (createAgentSession). Foundry's per-invocation sessionId maps onto a pi
  # session dir, continued across turns with SessionManager.continueRecent.
  provider: foundry
  # Replace with your Foundry model/deployment name, and keep it aligned with
  # OF_OPENAI_MODEL.
  model: <foundry-model-or-deployment>

foundry:
  protocol: invocations
  resources:
    # Valid Hosted Agent tiers currently include:
    # (0.25, 0.5Gi), (0.5, 1Gi), (1, 2Gi), (2, 4Gi)
    cpu: "2"
    memory: 4Gi

workspace:
  # Docker/Foundry defaults. Keep runtime code, workspace, and session state
  # conceptually separate.
  root: /workspace

sessions:
  enabled: true
  mode: pi-session-dir
  root: /home/node/.open-foundry/sessions

skills:
  # Bring your own Pi skills here.
  path: .agents/skills

mcp:
  optional: true
  config: mcp.config.json

environment:
  required:
    - REQUEST_TIMEOUT_MS
  requiredForRealModel:
    - OF_OPENAI_API_KEY
    - OF_OPENAI_BASE_URL
    - OF_OPENAI_MODEL
  optional:
    - GITHUB_TOKEN
    - JIRA_TOKEN
