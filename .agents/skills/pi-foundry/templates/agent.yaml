# pi-foundry skill bootstrap Hosted Agent definition. Free to edit.
# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
#
# To add your own env var (e.g. GITHUB_TOKEN), append an entry below AND in agent.manifest.yaml,
# then `azd env set GITHUB_TOKEN=...`. Avoid AGENT_*/FOUNDRY_* prefixes (Foundry-reserved).
# The harness (pi vs copilot) is fixed by the runtime image, not set here.
kind: hosted
name: <agent-name>
protocols:
  - protocol: invocations
    version: 1.0.0
image: example.azurecr.io/<agent-name>:latest
resources:
  cpu: "2"
  memory: 4Gi
environment_variables:
  - name: PI_ARGS
    value: ${PI_ARGS}
  - name: PI_MOCK
    value: ${PI_MOCK}
  - name: PI_MODEL_AUTH
    value: ${PI_MODEL_AUTH}
  - name: REQUEST_TIMEOUT_MS
    value: ${REQUEST_TIMEOUT_MS}
  - name: ENABLE_DIAGNOSTICS
    value: ${ENABLE_DIAGNOSTICS}
  - name: PI_OPENAI_API_KEY
    value: ${PI_OPENAI_API_KEY}
  - name: PI_OPENAI_BASE_URL
    value: ${PI_OPENAI_BASE_URL}
  - name: PI_OPENAI_MODEL
    value: ${PI_OPENAI_MODEL}
