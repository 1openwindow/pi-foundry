name: runtime-image

# Builds Dockerfile.runtime and publishes it to GHCR.
#
# Two images are built per run, one per harness (same version tags, different name):
#   pi      (default)  ->  ghcr.io/<owner>/pi-foundry-runtime:<tag>
#   copilot            ->  ghcr.io/<owner>/ghcp-foundry-runtime:<tag>
#
# Triggers:
#   - push a tag like  v0.2.0   → publishes  :0.2.0  :0.2  :latest  on both images
#   - workflow_dispatch  → publishes :sha-<short> and :manual-<run-number>
#                          on both images, never :latest
#
# Repo settings required (one-time):
#   Settings → Actions → General → Workflow permissions = Read and write
#   (or rely on the explicit `permissions:` block below — which we use).
#   Each GHCR package (pi-foundry-runtime, ghcp-foundry-runtime) must be made
#   public separately the first time it is published.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - harness: pi
            image: pi-foundry-runtime
          - harness: copilot
            image: ghcp-foundry-runtime
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=manual-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          push: true
          build-args: |
            HARNESS=${{ matrix.harness }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
